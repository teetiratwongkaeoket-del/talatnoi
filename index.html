// ===== FILTER =====
const categories = ["ทั้งหมด", ...new Set(data.map(d => d.Category))];

const filterDiv = document.getElementById("filters");
categories.forEach(cat=>{
  const btn=document.createElement("button");
  btn.innerText=cat;
  btn.onclick=()=>{
    document.querySelectorAll("button").forEach(b=>b.classList.remove("active"));
    btn.classList.add("active");
    render(cat);
  };
  filterDiv.appendChild(btn);
});

// ===== LIST =====
function render(filter="ทั้งหมด"){
  const list=document.getElementById("list");
  list.innerHTML="";

  data
  .filter(d=>filter==="ทั้งหมด" || d.Category===filter)
  .forEach(d=>{
    const div=document.createElement("div");
    div.className="place";

    div.innerHTML=`<b>${d.Name}</b><br>${d.Category} · ${d.Age} ปี`;

    div.onclick=()=>openPopup(d);

    list.appendChild(div);
  });
}

// ===== POPUP =====
function openPopup(d){
  document.getElementById("popup").classList.add("active");
  document.getElementById("overlay").style.display="block";

  document.getElementById("ptitle").innerText=d.Name;
  document.getElementById("pcat").innerText=d.Category + " · " + d.Age + " ปี";
  document.getElementById("pdesc").innerText=d.Description;
  document.getElementById("pimg").src=d.Media;
  document.getElementById("plink").href=d.Link;
}

function closePopup(){
  document.getElementById("popup").classList.remove("active");
  document.getElementById("overlay").style.display="none";
}

render();

</script>
